services:
  db:
    image: postgres:16
    container_name: pwa_restaurantes_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pwa_restaurantes_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
      JWT_SECRET: changeme-super-secret
      NEXT_PUBLIC_API_URL: http://localhost:3001
      PORT: 3001
      FRONTEND_PORT: 3000
    ports:
      - "3000:3000"
      - "3001:3001"

volumes:
  postgres_data:
