services:
  app:
    build:
      args:
        NEXT_PUBLIC_API_URL: "/api"
    environment:
      NEXT_PUBLIC_API_URL: "/api"
      CORS_ORIGINS: "*"    # allow any origin since tunnel URL is dynamic

  caddy:
    volumes:
      - ./deploy/Caddyfile.tunnel:/etc/caddy/Caddyfile:ro
    # Optional local-only check path:
    # curl -I http://127.0.0.1:8080
    ports: !override
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - caddy
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    networks:
      - internal

networks:
  internal:
    driver: bridge
